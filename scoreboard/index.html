<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scoreboard">
        <div class="home">
            <h1>HOME</h1>
            <div class="blackbox">
                <p id="homescore">0</p>
            </div>
            <div class="points">
                <button onclick="hadd1()">+1</button>
                <button onclick="hadd2()">+2</button>
                <button onclick="hadd3()">+3</button>
            </div>
        </div>

        <div class="guest">
            <h1>GUEST</h1>
            <div class="blackbox">
                <p id="guestscore">0</p>
            </div>
            <div class="points">
                <button onclick="gadd1()">+1</button>
                <button onclick="gadd2()">+2</button>
                <button onclick="gadd3()">+3</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
